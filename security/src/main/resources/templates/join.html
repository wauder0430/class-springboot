<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thymeleaf</title>
    <link rel="stylesheet" href="http://bit.ly/3WJ5ilK" />
</head>
<body>
    <!-- join.html -->
    <div th:replace="~{inc/header.html :: header}"></div>
    
    <h2>join</h2>
    
    <form method="POST" action="/joinok">
    <table class="vertical content">
        <tr>
            <th>아이디</th>
            <td><input type="text" name="username" class="short" required></td>
        </tr>
        <tr>
            <th>암호</th>
            <td><input type="password" name="password" class="short" required></td>
        </tr>
        <tr>
            <th>나이</th>
            <td><input type="number" name="age" class="short" required min="0" max="125" value="20"></td>
        </tr>
        <tr>
            <th>이메일</th>
            <td><input type="email" name="email" class="long" required></td>
        </tr>
        <tr>
            <th>권한</th>
            <td>
                <select name="role">
                    <option value="ROLE_MEMBER">일반회원</option>
                    <option value="ROLE_ADMIN">관리자</option>
                </select>
            </td>
        </tr>
    </table>
    <div>
        <button>로그인</button>
    </div>
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    </form>
    
</body>
</html>
